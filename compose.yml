services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "{{NAVIDROME_PORT}}:4533"
    volumes:
      # Navidrome state (database, cache, etc.)
      - {{NAVIDROME_DATA_DIR}}:/data
      # Music library on the NAS (read-only)
      - {{NAS_MUSIC_MOUNT}}:/music:ro
      # Backup destination on the NAS
      - {{NAS_BACKUP_MOUNT}}:/backup
      # Navidrome config file
      - ./navidrome.toml:/navidrome.toml:ro
    environment:
      ND_CONFIGFILE: /navidrome.toml
      # Backup configuration
      ND_BACKUP_PATH: /backup
      ND_BACKUP_SCHEDULE: "0 12 * * 5"  # every Friday at midday
      ND_BACKUP_COUNT: 20               # keep the 20 most recent backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4533/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "{{CLOUDFLARE_TUNNEL_TOKEN}}"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"